<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <style>
        body {
            display: flex;
            justify-content: center;
        }

        #btn {
            height: 30px;
            width: 80px;
            border: 3px solid black;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <button id="btn">Clicks: 0</button>

    <script>
        let c = 0;  // count
        const b = document.getElementById("btn"); // button

        b.addEventListener("click", function () {
            c++;
            b.innerText = `Clicks: ${c}`;
        });
    </script>

</body>
</html>
